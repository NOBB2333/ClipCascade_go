name: ClipCascade CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  # ──────────────── Test ────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Tidy modules
        run: |
          cd pkg && go mod tidy
          cd ../server && go mod tidy
          cd ../desktop && go mod tidy
          cd ../mobile && go mod tidy
      - name: Run tests
        run: go test -v -race ./pkg/... ./server/... ./mobile/...
      - name: Vet
        run: go vet ./pkg/... ./server/... ./mobile/...

  # ──────────────── Build Server ────────────────
  build-server:
    name: Build Server (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o ../clipcascade-server-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: clipcascade-server-*

  # ──────────────── Build Desktop ────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
          - os: macos-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
          - os: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev libxxf86vm-dev
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd desktop
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o ../clipcascade-desktop-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: clipcascade-desktop-*

  # ──────────────── Docker ────────────────
  docker:
    name: Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clipcascade:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clipcascade:${{ github.ref_name }}

  # ──────────────── Release ────────────────
  release:
    name: Create Release
    needs: [build-server, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
